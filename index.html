<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartSeed Web Build Directory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 {
            color: #2c3e50;
        }
    </style>
</head>
    <script>
        async function getLatestVersion(){
            let version = 1;
            let ok = true;
            while (ok){
                let response = await fetch("https://kye1331.github.io/hsbuilds/V" + version, {method: "HEAD"});
                console.log("version" + String(version) + ": " + response.status);
                if (response.status === 404){
                    ok = false;
                } else {
                version +=1; 
                }
            }            
            return version
        }
        
        async function loadLatestVersion(){
            let version = await getLatestVersion();
            loadVersion(version);
        }
        function loadVersion(version){
            
            open("/hsbuilds/V" + version);
        }
        
    </script>
<body>
    <p> Enter Version Number (e.g "1")</p>
    <input id="input" placeholder="Enter Version Number"> </input> <button onClick="loadVersion(document.getElementById('input').value);"> GO </button>
    <br>
    <button onClick="loadLatestVersion();"> Load Latest Version</button>
    
</body>
</html>
